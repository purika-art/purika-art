<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purika Art</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

h1 {
  color: #e91e63;
}

.upload-box {
  background: white;
  padding: 20px;
  border-radius: 15px;
}

img {
  max-width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

button {
  margin-top: 15px;
  padding: 15px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.ig {
  background: #e91e63;
  color: white;
}

.wp {
  background: #25D366;
  color: white;
}
</style>

</head>
<body>

<div class="container">
  <h1>🎨 Purika Art</h1>
  <p>Fotoğrafını yükle, tasarımını gör</p>

  <div class="upload-box">
    <input type="file" id="file">
    <img id="preview">

    <h3 id="price"></h3>

    <button class="ig" onclick="goInstagram()">Instagram’dan Sipariş</button>
    <button class="wp" onclick="goWhatsApp()">WhatsApp’tan Sipariş</button>
  </div>
</div>

<script>
const file = document.getElementById("file");
const preview = document.getElementById("preview");
const price = document.getElementById("price");

file.onchange = () => {
  const reader = new FileReader();
  reader.onload = () => {
    preview.src = reader.result;

    // rastgele fiyat
    const prices = ["250₺", "300₺", "350₺"];
    price.innerText = "Tahmini fiyat: " + prices[Math.floor(Math.random()*3)];
  }
  reader.readAsDataURL(file.files[0]);
}

function goInstagram() {
  window.location.href = "https://ig.me/m/purika.art";
}

function goWhatsApp() {
  window.location.href = "https://wa.me/905000000000";
}
</script>

</body>
</html>
