<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Purika Art</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    p {
      color: #555;
    }

    canvas {
      margin-top: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 20px;
      padding: 14px 25px;
      border: none;
      background: #E1306C;
      color: white;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
    }

    .box {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h1>🎨 Purika Art</h1>
<p>Fotoğrafını yükle, sana özel tasarımını oluştur</p>

<div class="box">
  <input type="file" id="upload" accept="image/*"><br>
  <canvas id="canvas" width="300" height="300"></canvas>

  <p>💡 Örnek mesaj: "Fotoğrafımı string art yaptırmak istiyorum"</p>

  <button onclick="order()">Instagram’dan Sipariş Ver</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

document.getElementById("upload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    ctx.drawImage(img, 0, 0, 300, 300);

    const imageData = ctx.getImageData(0, 0, 300, 300);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      let avg = (data[i] + data[i+1] + data[i+2]) / 3;
      let val = avg < 128 ? 0 : 255;
      data[i] = data[i+1] = data[i+2] = val;
    }

    ctx.putImageData(imageData, 0, 0);
  }
});

// 👇 BURAYI SONRA DEĞİŞTİREBİLİRSİN
function order() {
  window.location.href = "https://ig.me/m/purika.art";
}
</script>

</body>
</html>
