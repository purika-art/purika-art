<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purika Art</title>

<style>
body { font-family: Arial; background:#fafafa; text-align:center; }
.container { max-width:400px; margin:auto; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:16px;
}

.ig { background:#E1306C; color:white; }
.copy { background:#333; color:white; }

input, select { width:90%; padding:10px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>🎨 Purika Art</h1>
<p>Kişiye özel string art tasarım</p>

<div class="card">
<h3>📸 Fotoğraf Yükle</h3>
<input type="file" id="file">
</div>

<div class="card">
<h3>📸 Fotoğraf Kuralları</h3>
<p>✔️ Yüz net ve ortada olmalı</p>
<p>✔️ Arka plan sade olmalı</p>
<p>✔️ Işık iyi olmalı</p>
<p>✔️ Tek kişi önerilir</p>
</div>

<div class="card">
<h3>📏 Boyut Seç</h3>
<select id="size">
  <option>20x20 - 399₺</option>
  <option>30x30 - 499₺</option>
  <option>40x40 - 599₺</option>
</select>
</div>

<div class="card">
<h3>📦 Bilgiler</h3>
<input id="name" placeholder="Adınız">
<input id="city" placeholder="Şehir">
</div>

<div class="card">
<h3>📋 Sipariş Mesajı</h3>
<textarea id="message" rows="5" style="width:90%;"></textarea>
</div>

<button class="copy" onclick="createMessage()">Mesajı Hazırla</button>
<button class="copy" onclick="copyText()">Kopyala</button>
<button class="ig" onclick="goInstagram()">Instagram’a Git</button>

</div>

<script>
function createMessage() {
  let name = document.getElementById("name").value;
  let city = document.getElementById("city").value;
  let size = document.getElementById("size").value;

  let text = `Merhaba, sipariş vermek istiyorum:

İsim: ${name}
Şehir: ${city}
Boyut: ${size}

Fotoğrafımı ekliyorum.`;

  document.getElementById("message").value = text;
}

function copyText() {
  let text = document.getElementById("message");
  text.select();
  document.execCommand("copy");
  alert("Mesaj kopyalandı!");
}

function goInstagram() {
  window.location.href = "https://ig.me/m/purika.art";
}
</script>

</body>
</html>
