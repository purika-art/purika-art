<canvas id="canvas" width="300" height="300"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const size = 300;
const NAILS = 120;        // çivi sayısı
const LINES = 800;       // ip sayısı

let nails = [];
let imageData;

// çivi noktaları oluştur
function createNails() {
  nails = [];
  for (let i = 0; i < NAILS; i++) {
    let angle = (i / NAILS) * Math.PI * 2;
    nails.push({
      x: size/2 + (size/2 - 10) * Math.cos(angle),
      y: size/2 + (size/2 - 10) * Math.sin(angle)
    });
  }
}

// resmi yükle ve işle
function loadImage(src) {
  return new Promise(resolve => {
    let img = new Image();
    img.src = src;
    img.onload = () => {
      ctx.drawImage(img, 0, 0, size, size);

      let imgData = ctx.getImageData(0,0,size,size);
      let data = imgData.data;

      // gri ton + kontrast
      for (let i=0; i<data.length; i+=4) {
        let avg = (data[i]+data[i+1]+data[i+2])/3;
        avg = avg < 128 ? 0 : 255;
        data[i]=data[i+1]=data[i+2]=avg;
      }

      ctx.putImageData(imgData,0,0);
      imageData = ctx.getImageData(0,0,size,size);

      resolve();
    }
  });
}

// iki çivi arası çizgi skor
function getLineScore(a, b) {
  let score = 0;

  let steps = 50;
  for (let i=0; i<steps; i++) {
    let t = i/steps;
    let x = Math.floor(a.x*(1-t) + b.x*t);
    let y = Math.floor(a.y*(1-t) + b.y*t);

    let idx = (y*size + x)*4;
    score += imageData.data[idx]; // koyuluk
  }

  return score;
}

// çizgiyi uygula (resmi azalt)
function drawLine(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = "black";
  ctx.globalAlpha = 0.1;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ana algoritma
async function generate(src) {
  await loadImage(src);
  createNails();

  ctx.clearRect(0,0,size,size);

  let current = 0;
  let sequence = [];

  for (let i=0; i<LINES; i++) {

    let best = 0;
    let bestScore = -Infinity;

    for (let j=0; j<NAILS; j++) {
      if (j === current) continue;

      let score = getLineScore(nails[current], nails[j]);

      if (score > bestScore) {
        bestScore = score;
        best = j;
      }
    }

    drawLine(nails[current], nails[best]);
    sequence.push(best);

    current = best;
  }

  console.log("Üretim sırası:", sequence);
  alert("Hazır! Konsolda üretim planı var.");
}

// dosya yükleme
document.getElementById("file").onchange = function() {
  const reader = new FileReader();
  reader.onload = function(e) {
    generate(e.target.result);
  }
  reader.readAsDataURL(this.files[0]);
}
</script>
