<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purika Art</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.ig { background: #e91e63; color: white; }
.wp { background: #25D366; color: white; }

input {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🎨 Purika Art</h1>
<p>Fotoğrafını yükle, siparişini oluştur</p>

<div class="card">
<input type="file" id="file">
<img id="preview" style="max-width:100%; margin-top:10px; border-radius:10px;">
<h3 id="price"></h3>
</div>

<div class="card">
<h3>📦 Sipariş Bilgileri</h3>
<input placeholder="Adın">
<input placeholder="Telefon">
<input placeholder="Şehir">
</div>

<div class="card">
<h3>💬 Yorumlar</h3>
<p>⭐️⭐️⭐️⭐️⭐️ Çok güzel oldu!</p>
<p>⭐️⭐️⭐️⭐️⭐️ Hediye aldım bayıldılar</p>
<p>⭐️⭐️⭐️⭐️⭐️ Kalitesi harika</p>
</div>

<button class="ig" onclick="goInstagram()">Instagram’dan Sipariş</button>
<button class="wp" onclick="goWhatsApp()">WhatsApp’tan Sipariş</button>

</div>

<script>
const file = document.getElementById("file");
const preview = document.getElementById("preview");
const price = document.getElementById("price");

file.onchange = () => {
  const reader = new FileReader();
  reader.onload = () => {
    preview.src = reader.result;

    const prices = ["250₺", "300₺", "350₺"];
    price.innerText = "Tahmini fiyat: " + prices[Math.floor(Math.random()*3)];
  }
  reader.readAsDataURL(file.files[0]);
}

function goInstagram() {
  window.location.href = "https://ig.me/m/purika.art";
}

function goWhatsApp() {
  window.location.href = "https://wa.me/905000000000";
}
</script>

</body>
</html>
